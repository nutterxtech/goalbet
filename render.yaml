services:
  # ── GoalBet — Full-Stack (Express serves React + API) ───────────────────────
  - type: web
    name: goalbet
    runtime: node
    region: frankfurt
    plan: free
    rootDir: .
    # Build frontend first, then compile the backend
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      NODE_ENV=production pnpm --filter @workspace/football-betting run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORT_CODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: PESAPAL_CONSUMER_KEY
        sync: false
      - key: PESAPAL_CONSUMER_SECRET
        sync: false
      - key: PESAPAL_IPN_URL
        sync: false
